name: HCP connection test

on:
  workflow_dispatch:

jobs:
  test-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run HCP fetch test
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
        run: npm run test-fetch
