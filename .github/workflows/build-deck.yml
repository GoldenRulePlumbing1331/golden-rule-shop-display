name: Build deck

on:
  workflow_dispatch:
  schedule:
    # Every Monday 6 AM Eastern (covers both ET standard and DST)
    - cron: "0 11 * * MON"
    - cron: "0 10 * * MON"

permissions:
  # Required to create releases and upload assets
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Make output directory
        run: mkdir -p output

      - name: Build deck and publish release
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_CALENDAR_ID: ${{ vars.GOOGLE_CALENDAR_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build-deck

      - name: Upload deck as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: shop-briefing-pptx
          path: output/*.pptx
          retention-days: 30
