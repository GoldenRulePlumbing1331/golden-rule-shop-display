name: Build deck

on:
  schedule:
    # 6 AM ET = 10 UTC (DST) / 11 UTC (standard time) — run both for coverage
    - cron: '0 10 * * 1'
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build deck (HTML + PPTX)
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_CALENDAR_ID: ${{ vars.GOOGLE_CALENDAR_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build-deck

      - name: Prepare Pages site directory
        run: |
          mkdir -p pages-site
          cp output/GoldenRule_ShopBriefing_CURRENT.html pages-site/index.html
          # Also copy a friendly named version that someone could bookmark
          cp output/GoldenRule_ShopBriefing_CURRENT.html pages-site/shop-briefing.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
