name: Build deck

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 6:00 AM Eastern.
    # GitHub Actions cron runs in UTC. 6 AM ET = 11 AM UTC standard time, 10 AM UTC daylight time.
    # We schedule for both so the deck always lands by 6 AM local regardless of DST.
    - cron: "0 11 * * MON"
    - cron: "0 10 * * MON"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Make output directory
        run: mkdir -p output

      - name: Build deck
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_CALENDAR_ID: ${{ vars.GOOGLE_CALENDAR_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
        run: npm run build-deck

      - name: Upload deck as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-briefing-pptx
          path: output/*.pptx
          retention-days: 30
