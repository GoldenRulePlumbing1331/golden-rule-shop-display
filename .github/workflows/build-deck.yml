name: Build deck

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Make output directory
        run: mkdir -p output

      - name: Build deck
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          GOOGLE_CALENDAR_ID: ${{ vars.GOOGLE_CALENDAR_ID }}
        run: npm run build-deck

      - name: Upload deck as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-briefing-pptx
          path: output/*.pptx
          retention-days: 30
