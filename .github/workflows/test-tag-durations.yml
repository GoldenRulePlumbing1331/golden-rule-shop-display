name: Tag durations diagnostic

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run diagnostic
        env:
          HCP_API_KEY: ${{ secrets.HCP_API_KEY }}
        run: npm run test-tag-durations
